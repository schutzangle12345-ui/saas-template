<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Saas-template - Free AI Slides Tool</title>
    <meta name="description" content="Get in touch with Saas-template. We help founders, consultants, and sales teams design presentations fast with AI.">
    <meta name="keywords" content="free ai presentation maker, ai slide maker, contact saas-template, ai tool to create slides, free pitch deck generator">
    
    <!-- Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');

        :root {
            --color-primary: #7AC143;
            --color-primary-dark: #68a439; /* Darkened by 15% */
            --color-accent: #D61F5D;
            --color-info: #29ABE2;
            --color-background: #0A0C10;
            --color-surface: #161A22;
            --color-surface-soft: #232934;
            --color-text: #FFFFFF;
            --color-text-muted: #94A3B8;
            --color-border: #2D343F;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --radius-pill: 9999px;
            --radius-card: 32px;
            --container-width: 1200px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: 0.2s ease;
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Navigation */
        header {
            height: 80px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--color-background);
            border-bottom: 1px solid var(--color-border);
            z-index: 1000;
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-links a:hover {
            color: var(--color-primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            border-radius: var(--radius-pill);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            border: none;
            font-size: 16px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: #000;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--color-border);
            color: var(--color-text);
        }

        .btn-outline:hover {
            border-color: var(--color-text);
        }

        /* Hero Section */
        .contact-hero {
            padding: 100px 0 60px;
        }

        .hero-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: flex-start;
        }

        @media (max-width: 992px) {
            .hero-layout {
                grid-template-columns: 1fr;
                gap: 48px;
            }
        }

        .hero-content h1 {
            font-size: clamp(48px, 8vw, 84px);
            margin-bottom: 24px;
        }

        .hero-content p {
            font-size: 20px;
            color: var(--color-text-muted);
            margin-bottom: 40px;
            max-width: 500px;
        }

        /* Form Styling */
        .contact-card {
            background: var(--color-surface);
            padding: 48px;
            border-radius: var(--radius-card);
            border: 1px solid var(--color-border);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .form-control {
            width: 100%;
            background: var(--color-surface-soft);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px;
            color: var(--color-text);
            font-family: inherit;
            font-size: 16px;
            transition: border-color 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }

        /* Contact Info Blocks */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-top: 60px;
        }

        .info-item {
            background: var(--color-surface);
            padding: 32px;
            border-radius: var(--radius-card);
            border: 1px solid var(--color-border);
        }

        .info-item h3 {
            font-size: 24px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-item .icon {
            width: 40px;
            height: 40px;
            background: var(--color-surface-soft);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
        }

        .accent-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--color-accent);
        }

        /* Use Case Pillars Section */
        .pillars-section {
            padding: 100px 0;
            border-top: 1px solid var(--color-border);
        }

        .section-tag {
            background: var(--color-surface-soft);
            color: var(--color-info);
            padding: 6px 16px;
            border-radius: var(--radius-pill);
            font-size: 14px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        /* Footer */
        footer {
            padding: 80px 0 40px;
            border-top: 1px solid var(--color-border);
            margin-top: 100px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 48px;
            margin-bottom: 60px;
        }

        @media (max-width: 768px) {
            .footer-grid {
                grid-template-columns: 1fr;
            }
        }

        .footer-logo {
            margin-bottom: 24px;
            display: block;
        }

        .footer-heading {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-link {
            display: block;
            margin-bottom: 12px;
            color: var(--color-text-muted);
        }

        .footer-link:hover {
            color: var(--color-primary);
        }

        .social-links {
            display: flex;
            gap: 16px;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            background: var(--color-surface);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--color-border);
        }

        .copyright {
            padding-top: 40px;
            border-top: 1px solid var(--color-border);
            color: var(--color-text-muted);
            text-align: center;
            font-size: 14px;
        }

        .badge-accent {
            background: var(--color-accent);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
            vertical-align: middle;
        }

    </style>
