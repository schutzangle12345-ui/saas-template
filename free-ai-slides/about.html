<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Saas-template - The Future of AI Presentations</title>
    <meta name="description" content="Learn why we built Saas-template, the free AI slides tool designed for founders, consultants, and sales reps to create stunning decks in minutes.">
    
    <!-- Google Fonts: Plus Jakarta Sans for that premium bold look -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');

        :root {
            --color-primary: #7AC143;
            --color-primary-dark: #68a439; /* 15% darker */
            --color-accent: #D61F5D;
            --color-secondary: #29ABE2;
            --color-background: #0a0c10;
            --color-surface: #161b22;
            --color-surface-soft: #21262d;
            --color-text: #ffffff;
            --color-text-muted: #8b949e;
            --color-border: #30363d;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --container-width: 1200px;
            --radius-pill: 9999px;
            --radius-card: 32px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Navigation */
        nav {
            height: 80px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            background: var(--color-background);
            z-index: 1000;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a:hover {
            color: var(--color-primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 2rem;
            border-radius: var(--radius-pill);
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: #000;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--color-border);
            color: var(--color-text);
        }

        .btn-outline:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        /* Hero Section */
        .hero {
            padding: 8rem 0 6rem;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-content h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            margin-bottom: 2rem;
        }

        .hero-content p {
            font-size: 1.25rem;
            color: var(--color-text-muted);
            margin-bottom: 2.5rem;
            max-width: 600px;
        }

        .hero-mockup {
            background: var(--color-surface);
            height: 500px;
            border-radius: var(--radius-card);
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .hero-mockup::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 80%;
            background: var(--color-primary);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
        }

        /* Story Section */
        .story-section {
            padding: 6rem 0;
            border-top: 1px solid var(--color-border);
        }

        .section-tag {
            color: var(--color-accent);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            display: block;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .story-card {
            background: var(--color-surface);
            padding: 3rem;
            border-radius: var(--radius-card);
            height: 100%;
        }

        /* Values Section */
        .values-section {
            padding: 6rem 0;
        }

        .values-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 4rem;
        }

        .value-card {
            background: var(--color-surface);
            padding: 3rem;
            border-radius: var(--radius-card);
            border: 1px solid var(--color-border);
        }

        .value-card h3 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
        }

        .value-icon {
            width: 64px;
            height: 64px;
            background: var(--color-surface-soft);
            border-radius: 16px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
        }

        .accent-dot {
            width: 12px;
            height: 12px;
            background: var(--color-accent);
            display: inline-block;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* Form Section */
        .cta-section {
            padding: 8rem 0;
            text-align: center;
        }

        .cta-box {
            background: var(--color-surface);
            padding: 5rem 2rem;
            border-radius: var(--radius-card);
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid var(--color-border);
        }

        .cta-box h2 {
            font-size: 3.5rem;
            margin-bottom: 2rem;
        }

        .contact-form {
            max-width: 500px;
            margin: 3rem auto 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 1.2rem;
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            color: white;
            font-family: var(--font-sans);
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        /* Footer */
        footer {
            padding: 6rem 0 3rem;
            border-top: 1px solid var(--color-border);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 4rem;
            margin-bottom: 4rem;
        }

        .footer-brand p {
            color: var(--color-text-muted);
            margin-top: 1.5rem;
            max-width: 300px;
        }

        .footer-links h4 {
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .footer-links ul li {
            margin-bottom: 0.8rem;
        }

        .footer-links ul li a {
            color: var(--color-text-muted);
        }

        .footer-links ul li a:hover {
            color: var(--color-primary);
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            background: var(--color-surface);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--color-border);
        }

        .footer-bottom {
            padding-top: 3rem;
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 968px) {
            .hero {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .hero-content p {
                margin: 0 auto 2.5rem;
            }
            .grid-2, .values-grid {
                grid-template-columns: 1fr;
            }
            .footer-grid {
                grid-template-columns: 1fr 1fr;
            }
            .hero-mockup {
                height: 300px;
            }
        }

        @media (max-width: 480px) {
            .footer-grid {
                grid-template-columns: 1fr;
            }
            .hero-content h1 {
                font-size: 3rem;
            }
            .cta-box h2 {
                font-size: 2.2rem;
            }
        }
    </style>
