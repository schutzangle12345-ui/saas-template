<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Saas-template - Free AI Slides Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #7AC143;
            --color-primary-dark: #68a439; /* 15% darkened #7AC143 */
            --color-accent: #D61F5D;
            --color-secondary: #29ABE2;
            --color-background: #0B0E14;
            --color-surface: #161B22;
            --color-text: #FFFFFF;
            --color-text-muted: #8B949E;
            --color-border: #30363D;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --radius-pill: 9999px;
            --radius-card: 32px;
            --radius-input: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 0.5rem;
        }

        .logo img {
            height: 40px;
            object-fit: contain;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--color-primary);
        }

        .nav-cta {
            background-color: var(--color-primary);
            color: #000;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-pill);
            transition: background-color 0.2s;
        }

        .nav-cta:hover {
            background-color: var(--color-primary-dark);
            color: #000;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 1.5rem 4rem;
        }

        .auth-card {
            background-color: var(--color-surface);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-card);
            padding: 3rem;
            border: 1px solid var(--color-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .auth-header p {
            color: var(--color-text-muted);
            font-size: 1.1rem;
        }

        /* Tabs System */
        .tabs {
            display: flex;
            background-color: var(--color-background);
            padding: 0.4rem;
            border-radius: var(--radius-pill);
            margin-bottom: 2.5rem;
            border: 1px solid var(--color-border);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--color-text-muted);
            padding: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: var(--radius-pill);
            transition: all 0.2s;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tab-btn.active {
            background-color: var(--color-primary);
            color: #000;
        }

        /* Forms */
        .auth-content {
            display: none;
        }

        .auth-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.25rem;
            background-color: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-input);
            color: var(--color-text);
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            background-color: var(--color-primary);
            color: #000;
            border: none;
            border-radius: var(--radius-pill);
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: var(--color-primary-dark);
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Footer */
        footer {
            padding: 4rem 2rem;
            border-top: 1px solid var(--color-border);
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .footer-brand h2 {
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--color-primary);
        }

        .footer-links h4 {
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-text-muted);
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 0.75rem;
        }

        .footer-links a {
            color: var(--color-text);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--color-primary);
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .social-icons {
            display: flex;
            gap: 1.5rem;
        }

        .social-icons svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: color 0.2s;
            cursor: pointer;
        }

        .social-icons svg:hover {
            color: var(--color-accent);
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem;
            }
            nav {
                display: none;
            }
            .auth-card {
                padding: 2rem 1.5rem;
            }
            .auth-header h1 {
                font-size: 2rem;
            }
            .footer-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
