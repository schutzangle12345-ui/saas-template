<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Saas-template - AI Startup Consultancy</title>
    <meta name="description" content="Learn about the mission behind Saas-template, the premier AI startup consultancy helping founders scale from prototype to repeatable sales.">
    
    <!-- Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');

        :root {
            --color-primary: #7AC143;
            --color-primary-dark: #68A439;
            --color-accent: #D61F5D;
            --color-secondary: #29ABE2;
            --color-background: #0A0A0A;
            --color-surface: #161616;
            --color-surface-soft: #222222;
            --color-text: #FFFFFF;
            --color-text-muted: #A0A0A0;
            --color-border: #2A2A2A;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --radius-pill: 9999px;
            --radius-lg: 40px;
            --radius-md: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Typography */
        h1, h2, h3 {
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        h1 { font-size: clamp(3rem, 8vw, 6rem); }
        h2 { font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 2rem; }
        h3 { font-size: 1.75rem; margin-bottom: 1rem; }

        p {
            font-size: 1.125rem;
            color: var(--color-text-muted);
            max-width: 60ch;
        }

        /* Layout */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        section {
            padding: 8rem 0;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background-color: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--color-border);
            padding: 1.25rem 0;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--color-text);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--color-primary);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2.5rem;
            border-radius: var(--radius-pill);
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background-color: var(--color-primary);
            color: var(--color-background);
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
        }

        .btn-outline {
            border: 2px solid var(--color-border);
            color: var(--color-text);
            background: transparent;
        }

        .btn-outline:hover {
            border-color: var(--color-text);
        }

        /* Hero Section */
        .hero {
            padding-top: 12rem;
            padding-bottom: 6rem;
            display: grid;
            grid-template-cols: 1.2fr 0.8fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-image {
            background-color: var(--color-surface);
            border-radius: var(--radius-lg);
            height: 500px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--color-border);
        }

        .hero-accent-block {
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 300px;
            height: 300px;
            background-color: var(--color-accent);
            border-radius: var(--radius-md);
            z-index: -1;
        }

        /* Content Blocks */
        .grid-3 {
            display: grid;
            grid-template-cols: repeat(3, 1fr);
            gap: 2rem;
        }

        .card {
            background-color: var(--color-surface);
            padding: 3rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: var(--color-secondary);
        }

        .stat-number {
            font-size: 4rem;
            font-weight: 900;
            color: var(--color-primary);
            display: block;
            margin-bottom: 0.5rem;
        }

        /* Mission Section */
        .mission-box {
            background-color: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 4rem;
            border-left: 12px solid var(--color-primary);
        }

        /* Form Styling */
        .contact-form-section {
            background-color: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 5rem;
            margin-bottom: 8rem;
        }

        .form-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: var(--color-text-muted);
        }

        .form-control {
            width: 100%;
            background-color: var(--color-background);
            border: 2px solid var(--color-border);
            padding: 1.25rem;
            border-radius: 16px;
            color: var(--color-text);
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }

        /* Footer */
        footer {
            background-color: var(--color-surface);
            padding: 5rem 0 2rem;
            border-top: 1px solid var(--color-border);
        }

        .footer-grid {
            display: grid;
            grid-template-cols: 2fr 1fr 1fr 1fr;
            gap: 4rem;
            margin-bottom: 4rem;
        }

        .footer-logo {
            margin-bottom: 1.5rem;
        }

        .footer-links h4 {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            color: var(--color-text);
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links ul li {
            margin-bottom: 0.75rem;
        }

        .footer-links ul li a {
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .footer-links ul li a:hover {
            color: var(--color-primary);
        }

        .social-icons {
            display: flex;
            gap: 1rem;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            background-color: var(--color-background);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--color-border);
        }

        .copyright {
            padding-top: 2rem;
            border-top: 1px solid var(--color-border);
            text-align: center;
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }

        /* Mobile Adjustments */
        @media (max-width: 992px) {
            .hero { grid-template-cols: 1fr; text-align: center; }
            .hero p { margin: 0 auto 2rem; }
            .hero-image { display: none; }
            .grid-3 { grid-template-cols: 1fr; }
            .form-grid { grid-template-cols: 1fr; }
            .footer-grid { grid-template-cols: 1fr 1fr; }
        }

        @media (max-width: 600px) {
            .footer-grid { grid-template-cols: 1fr; }
            .contact-form-section { padding: 2rem; }
        }
    </style>
