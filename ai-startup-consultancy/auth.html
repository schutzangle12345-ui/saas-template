<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In & Sign Up | Saas-template - AI Startup Consultancy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --color-primary: #7AC143;
            --color-primary-dark: #67a439; /* 15% darker than #7AC143 */
            --color-accent: #D61F5D;
            --color-secondary: #29ABE2;
            --color-background: #0A0A0B;
            --color-surface: #141416;
            --color-text: #FFFFFF;
            --color-text-muted: #94A3B8;
            --color-border: #2D2D30;
            --font-sans: 'Inter', sans-serif;
            --radius-pill: 9999px;
            --radius-card: 32px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Navigation */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        nav {
            display: none;
            gap: 2rem;
            align-items: center;
        }

        @media (min-width: 768px) {
            nav {
                display: flex;
            }
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--color-primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1.8rem;
            border-radius: var(--radius-pill);
            font-weight: 800;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: #000;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
            transform: scale(1.02);
        }

        /* Auth Container */
        .auth-wrapper {
            min-height: calc(100vh - 160px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background-color: var(--color-surface);
            width: 100%;
            max-width: 480px;
            padding: 3rem 2rem;
            border-radius: var(--radius-card);
            border: 1px solid var(--color-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-top: 1.5rem;
            letter-spacing: -0.02em;
        }

        /* Tabs System */
        .tab-switcher {
            display: flex;
            background: #000;
            padding: 0.4rem;
            border-radius: var(--radius-pill);
            margin-bottom: 2.5rem;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: transparent;
            color: var(--color-text-muted);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            z-index: 1;
            transition: color 0.3s;
            border-radius: var(--radius-pill);
        }

        .tab-btn.active {
            color: #000;
            background-color: var(--color-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        .form-input {
            width: 100%;
            background-color: #000;
            border: 1px solid var(--color-border);
            padding: 1rem 1.2rem;
            border-radius: 16px;
            color: var(--color-text);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .form-submit {
            width: 100%;
            margin-top: 1rem;
        }

        .auth-footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }

        .accent-text {
            color: var(--color-accent);
            font-weight: bold;
        }

        /* Footer */
        footer {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            border-top: 1px solid var(--color-border);
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
        }

        @media (min-width: 768px) {
            footer {
                grid-template-columns: 2fr 1fr 1fr 1fr;
            }
        }

        .footer-brand p {
            color: var(--color-text-muted);
            margin-top: 1rem;
            max-width: 300px;
        }

        .footer-links h4 {
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            color: var(--color-primary);
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links ul li {
            margin-bottom: 0.8rem;
        }

        .footer-links ul li a {
            color: var(--color-text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links ul li a:hover {
            color: var(--color-text);
        }

        .social-icons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-icons svg {
            fill: var(--color-text-muted);
            width: 20px;
            height: 20px;
            transition: fill 0.2s;
        }

        .social-icons a:hover svg {
            fill: var(--color-secondary);
        }

        .copyright {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--color-text-muted);
            font-size: 0.85rem;
            margin-top: 2rem;
        }
    </style>
